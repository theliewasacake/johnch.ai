<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aldrich&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/panel-lines.css">
  <link rel="stylesheet" href="/css/glitch.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <script src="/admin/admin.js"></script>
  <style>
    .login-container {
      max-width: 360px;
      margin: 20vh auto;
      padding: 0 var(--space-lg);
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
    .login-error {
      color: var(--accent-red);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      display: none;
    }
    .login-theme-toggle {
      position: fixed;
      top: var(--space-md);
      right: var(--space-md);
    }
  </style>
  <script src="/js/glitch.js"></script>
</head>
<body>
  <button class="admin-btn login-theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">◐</button>
  <div class="login-container">
    <div class="panel panel--greeble">
      <div class="section-header__label">System Access</div>
      <h1 style="margin-bottom: var(--space-lg);">Admin Login</h1>
      <form class="login-form" onsubmit="handleLogin(event)">
        <input type="password" class="field__input" id="password" placeholder="Password" autocomplete="current-password" required>
        <div class="login-error" id="error">Invalid password</div>
        <button type="submit" class="admin-btn admin-btn--save">Authenticate</button>
      </form>
    </div>
  </div>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      var pw = document.getElementById('password').value;
      var errEl = document.getElementById('error');
      errEl.style.display = 'none';

      try {
        var res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        if (res.ok) {
          window.location.href = '/admin/index.html';
        } else {
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = 'Connection error';
        errEl.style.display = 'block';
      }
    }

  </script>
</body>
</html>

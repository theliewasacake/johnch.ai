services:
  web:
    image: ghcr.io/theliewasacake/johnch.ai:latest
    pull_policy: always
    container_name: ${CONTAINER_NAME:-blog-site}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Node environment
      - NODE_ENV=production
      # Server port
      - PORT=3000
      # Bcrypt hash of admin password
      # Generate with: node -e "console.log(require('bcrypt').hashSync('yourpassword', 10))"
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      # Secret for Express sessions (use a long random string)
      - SESSION_SECRET=${SESSION_SECRET}
      # Content repo URL (optional - only if using separate content repo)
      - CONTENT_REPO_URL=${CONTENT_REPO_URL}
      # Base64-encoded deploy key for private content repo
      - CONTENT_DEPLOY_KEY=${CONTENT_DEPLOY_KEY}
      # Git committer identity for content repo commits
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - GIT_USER_NAME=${GIT_USER_NAME}
    volumes:
      # Persist uploaded images only (content is cloned fresh from git)
      - images_data:/app/public/images
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  images_data:
